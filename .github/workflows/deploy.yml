name: Deploy to Heroku (Direct Input)

on:
  workflow_dispatch:
    inputs:
      HEROKU_APP_NAME:
        description: "Enter your Heroku App Name"
        required: true
      HEROKU_EMAIL:
        description: "Enter your Heroku Email"
        required: true
      HEROKU_API_KEY:
        description: "Enter your Heroku API Key"
        required: true
      APP_ID:
        description: "Enter your Telegram APP_ID"
        required: true
      API_HASH:
        description: "Enter your Telegram API_HASH"
        required: true
      BOT_TOKEN:
        description: "Enter your Telegram BOT_TOKEN"
        required: true
      OWNER:
        description: "Enter the OWNER Telegram User ID"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Heroku CLI
      run: |
        curl https://cli-assets.heroku.com/install.sh | sh

    - name: Log in to Heroku
      run: |
        echo "machine api.heroku.com" > ~/.netrc
        echo "  login ${{ github.event.inputs.HEROKU_EMAIL }}" >> ~/.netrc
        echo "  password ${{ github.event.inputs.HEROKU_API_KEY }}" >> ~/.netrc
        echo "machine git.heroku.com" >> ~/.netrc
        echo "  login ${{ github.event.inputs.HEROKU_EMAIL }}" >> ~/.netrc
        echo "  password ${{ github.event.inputs.HEROKU_API_KEY }}" >> ~/.netrc
        chmod 600 ~/.netrc
        heroku auth:token

    - name: Log in to Heroku Container Registry
      run: |
        echo ${{ github.event.inputs.HEROKU_API_KEY }} | docker login --username=_ --password-stdin registry.heroku.com

    - name: Build and push Docker container to Heroku
      run: |
        heroku container:push web --app ${{ github.event.inputs.HEROKU_APP_NAME }}
        heroku container:release web --app ${{ github.event.inputs.HEROKU_APP_NAME }}

    - name: Set environment variables in Heroku
      run: |
        heroku config:set APP_ID=${{ github.event.inputs.APP_ID }} \
                          API_HASH=${{ github.event.inputs.API_HASH }} \
                          BOT_TOKEN=${{ github.event.inputs.BOT_TOKEN }} \
                          OWNER=${{ github.event.inputs.OWNER }} \
                          --app ${{ github.event.inputs.HEROKU_APP_NAME }}
