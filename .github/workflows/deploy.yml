name: Deploy to Heroku (Interactive Inputs)

on:
  workflow_dispatch:
    inputs:
      HEROKU_APP_NAME:
        description: "Enter your Heroku App Name"
        required: true
      HEROKU_TEAM_NAME:
        description: "Enter your Heroku Team Name (if any)"
        required: false
      APP_ID:
        description: "Enter your Telegram APP_ID"
        required: true
      API_HASH:
        description: "Enter your Telegram API_HASH"
        required: true
      BOT_TOKEN:
        description: "Enter your Telegram BOT_TOKEN"
        required: true
      OWNER:
        description: "Enter the OWNER Telegram User ID"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to the Heroku Container Registry
      env:
        HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      run: |
        echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com

    - name: Build and push Docker container to Heroku
      run: |
        heroku container:push web --app ${{ github.event.inputs.HEROKU_APP_NAME }} \
          ${github.event.inputs.HEROKU_TEAM_NAME:+--team ${{ github.event.inputs.HEROKU_TEAM_NAME }}}
        heroku container:release web --app ${{ github.event.inputs.HEROKU_APP_NAME }}

    - name: Set environment variables in Heroku
      run: |
        heroku config:set APP_ID=${{ github.event.inputs.APP_ID }} \
                          API_HASH=${{ github.event.inputs.API_HASH }} \
                          BOT_TOKEN=${{ github.event.inputs.BOT_TOKEN }} \
                          OWNER=${{ github.event.inputs.OWNER }} \
                          --app ${{ github.event.inputs.HEROKU_APP_NAME }}
      env:
        HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
